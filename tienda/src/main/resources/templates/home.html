<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Uno - Home</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #8b5cf6;
            --accent: #10b981;
            --text-main: #f8fafc;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --font-main: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* NAVEGACIÓN */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            color: white;
        }

        .menu-dots {
            display: flex;
            gap: 8px;
            cursor: pointer;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 5%;
            text-align: center;
        }

        .bg-title {
            position: absolute;
            font-size: 22vw;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            z-index: -1;
            line-height: 0.8;
            user-select: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            letter-spacing: -10px;
        }

        .hero-content h1 {
            font-size: clamp(3.5rem, 10vw, 7rem);
            line-height: 1;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -4px;
            text-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .hero-content p {
            font-size: 1.2rem;
            max-width: 500px;
            margin: 0 auto 40px;
            color: #94a3b8;
            font-weight: 400;
        }

        /* BOTONES ESTILO LISTA */
        .cta-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            position: relative;
        }

        .btn-main {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 14px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            display: inline-flex;
            align-items: center;
            font-size: 1rem;
        }

        .btn-main:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }

        /* ELEMENTOS FLOTANTES CON EFECTO CRISTAL */
        .float-img {
            position: absolute;
            width: 250px;
            height: 320px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            transition: all 0.6s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .img-1 { top: 15%; left: 10%; transform: rotate(-10deg); }
        .img-2 { bottom: 10%; right: 12%; transform: rotate(8deg); }

        .float-img:hover {
            transform: rotate(0deg) translateY(-20px) scale(1.05);
            border-color: var(--secondary);
            z-index: 10;
        }

        .img-label {
            padding: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(15, 23, 42, 0.8);
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* INDICADOR SCROLL */
        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #64748b;
        }

        .line {
            width: 2px;
            height: 50px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            animation: grow 2s infinite alternate;
        }

        @keyframes grow {
            from { height: 20px; opacity: 0.3; }
            to { height: 60px; opacity: 1; }
        }

        @media (max-width: 768px) {
            .float-img { display: none; }
            .bg-title { font-size: 35vw; }
            .cta-container { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">TiendaUno</div>
    <div class="menu-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
</nav>

<main class="hero">
    <div class="bg-title">UNO</div>

    <div class="float-img img-1">
        <div class="img-label">Dulces de Guayaba</div>
    </div>

    <div class="hero-content">
        <h1>Tienda<br><span style="background: linear-gradient(to right, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">UNO.</span></h1>
        <p>Seguridad y calidad en cada producto.<br>La mejor tienda anti-robos.</p>

        <div class="cta-container">
            <a th:href="@{/usuarios}" class="btn-main">Gestionar Usuarios</a>
            <a th:href="@{/productos}" class="btn-main" style="background: linear-gradient(to right, #10b981, #34d399); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);">Explorar Productos</a>
        </div>
    </div>

    <div class="float-img img-2">
        <div class="img-label">Dulces Chao</div>
    </div>
    x
</main>

</body>
</html>
