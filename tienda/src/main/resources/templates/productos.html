<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Productos</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #8b5cf6;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --edit: #10b981;
            --edit-hover: #059669;
            --text-main: #1f2937;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            color: var(--text-main);
        }

        .titulo {
            color: #f8fafc;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            letter-spacing: -1.5px;
        }

        .subtitulo {
            color: #94a3b8;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .btn-nuevo {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home {
            background: linear-gradient(to right, #64748b, #475569);
            box-shadow: 0 10px 25px rgba(71, 85, 105, 0.3);
        }

        .btn-nuevo:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }

        .table-container {
            width: 100%;
            max-width: 1100px;
            background: var(--glass);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 16px;
            text-align: left;
            text-transform: uppercase;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #64748b;
            border-bottom: 1px solid #f1f5f9;
        }

        td {
            padding: 18px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
            color: #334155;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: #f8fafc;
        }

        .user-id {
            color: var(--primary);
            font-family: monospace;
            font-weight: bold;
            background: #eef2ff;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn-action {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .btn-edit {
            background: #ecfdf5;
            color: var(--edit);
        }

        .btn-edit:hover {
            background: var(--edit);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-delete {
            background: #fef2f2;
            color: var(--danger);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .age-badge {
            background: #f1f5f9;
            color: #475569;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
        }

        .stock-badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .stock-normal {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .stock-low {
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #fdba74;
        }
    </style>
</head>
<body>

<h1 class="titulo">Lista de Productos</h1>
<p class="subtitulo">Gestión de Productos</p>

<div class="button-group">
    <a th:href="@{/productos/nuevo}" class="btn-nuevo">
        <span>+</span> Registrar Nuevo Producto
    </a>
    <a th:href="@{/home}" class="btn-nuevo btn-home">
        <span>←</span> Volver a Home
    </a>
</div>

<div class="table-container">
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Categoría</th>
            <th style="text-align: right;">Operaciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="producto : ${productos}">
            <td>
                <span class="user-id" th:text="${'#' + producto.idProducto}">#1</span>
            </td>
            <td>
                <div style="font-weight: 600;" th:text="${producto.nombreProducto}">Nombre</div>
            </td>
            <td>
                <span class="age-badge" th:text="${'Q.' + producto.precioProducto}">Q.0.00</span>
            </td>
            <td>
                <span class="stock-badge"
                      th:classappend="${producto.stockProducto <= 5} ? 'stock-low' : 'stock-normal'"
                      th:text="${producto.stockProducto}">0</span>
            </td>
            <td>
                <span class="age-badge" th:text="${producto.categoria.nombreCategoria}">Categoría</span>
            </td>
            <td class="actions">
                <a th:href="@{/productos/editar/{id}(id=${producto.idProducto})}" class="btn-action btn-edit">Editar</a>
                <a th:href="@{/productos/eliminar/{id}(id=${producto.idProducto})}" class="btn-action btn-delete">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
