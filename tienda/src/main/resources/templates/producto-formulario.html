<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicion} ? 'Editar Producto' : 'Nuevo Producto'"></title>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #8b5cf6;
            --danger: #ef4444;
            --text-main: #1f2937;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        h1 {
            color: var(--text-main);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitulo {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        form {
            width: 100%;
        }

        .campo {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Estilo para los errores de validación */
        .error {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 6px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .error::before {
            content: '⚠';
        }

        .acciones {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-guardar {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .btn-guardar:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 15px 20px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-cancelar {
            background-color: transparent;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }

        .btn-cancelar:hover {
            background-color: #f1f5f9;
            color: var(--text-main);
        }
    </style>
</head>

<body>

<div class="container">
    <h1 th:text="${modoEdicion} ? 'Editar Producto' : 'Nuevo Producto'">Nuevo Producto</h1>
    <p class="subtitulo">Completa la información del nuevo producto</p>

    <form th:action="@{/productos/guardar}"
          th:object="${producto}"
          method="post">

        <input type="hidden" th:field="*{idProducto}" th:if="${modoEdicion}">

        <div class="campo">
            <label for="nombreProducto">Producto</label>
            <input type="text" id="nombreProducto" th:field="*{nombreProducto}" placeholder="Ingrese el Producto">
            <div class="error"
                 th:if="${#fields.hasErrors('nombreProducto')}"
                 th:errors="*{nombreProducto}">Error en Producto</div>
        </div>

        <div class="campo">
            <label for="precioProducto">Producto</label>
            <input type="text" id="precioProducto" th:field="*{precioProducto}" placeholder="Ingrese el precio del producto">
            <div class="error"
                 th:if="${#fields.hasErrors('precioProducto')}"
                 th:errors="*{precioProducto}">Error en precio</div>
        </div>

        <div class="campo">
            <label for="stockProducto">Stock</label>
            <input type="number" id="stockProducto" th:field="*{stockProducto}" placeholder="0">
            <div class="error"
                 th:if="${#fields.hasErrors('stockProducto')}"
                 th:errors="*{stockProducto}">Error en stock</div>
        </div>

        <div class="campo">
            <label for="categoria">Categoría</label>
            <select id="categoria" th:field="*{categoria.idCategoria}" class="combo-box">
                <option value="" disabled selected>Seleccione una categoría</option>
                <option th:each="cat : ${categorias}"
                        th:value="${cat.idCategoria}"
                        th:text="${cat.nombreCategoria}">
                </option>
            </select>
            <div class="error"
                 th:if="${#fields.hasErrors('categoria')}"
                 th:errors="*{categoria}">Error en categoria</div>
        </div>

        <div class="acciones">
            <button type="submit" class="btn btn-guardar">
                Guardar
            </button>

            <a th:href="@{/productos}" class="btn btn-cancelar">Volver</a>
        </div>
    </form>
</div>

</body>
</html>
