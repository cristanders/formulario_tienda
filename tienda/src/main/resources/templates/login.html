<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Tienda Uno</title>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #8b5cf6;
            --danger: #ef4444;
            --success: #10b981;
            --text-main: #1f2937;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --glass: rgba(255, 255, 255, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .tarjeta {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 40px 35px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: aparecer 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .titulo {
            font-size: 2rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitulo {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        /* Mensajes de feedback */
        .mensaje {
            margin-bottom: 20px;
            padding: 14px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .error {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fee2e2;
        }

        .success {
            background: #ecfdf5;
            color: var(--success);
            border: 1px solid #d1fae5;
        }

        /* Formulario */
        .campo {
            margin-bottom: 20px;
            text-align: left;
        }

        .campo label {
            display: block;
            font-size: 0.75rem;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .campo input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #f1f5f9;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: #f8fafc;
            transition: all 0.3s ease;
            color: #1e293b;
        }

        .campo input:focus {
            border-color: var(--primary);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Botones estilo Tienda Uno */
        .boton {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .btn-principal {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            margin-bottom: 15px;
        }

        .btn-secundario {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
        }

        .boton:hover {
            transform: scale(1.02) translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-principal:hover {
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.4);
        }

        .btn-secundario:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .acciones {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 30px 25px;
            }
            .titulo {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">TiendaUNO</h2>
        <p class="subtitulo">Inicie sesión para acceder al sistema</p>

        <div th:if="${param.error}" class="mensaje error">
            Usuario o contraseña incorrectos
        </div>

        <div th:if="${param.logout}" class="mensaje success">
            Sesión cerrada correctamente
        </div>

        <form th:action="@{/login}" method="post">
            <div class="campo">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Tu usuario" required autocomplete="username">
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="boton btn-principal">Entrar al Sistema</button>
        </form>

        <div class="acciones">
            <a th:href="@{/register}" class="boton btn-secundario"> Regístrate</a>
        </div>
    </div>
</div>

</body>
</html>
